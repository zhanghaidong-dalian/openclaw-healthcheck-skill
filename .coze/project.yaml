name: OpenClaw-Personal-Assistant
version: "1.0.0"
preview:
  type: openclaw
  command:
    - /bin/bash
    - /workspace/projects/start-gateway.sh
  port: 5000
  startupTimeoutSeconds: 120
  healthCheck:
    path: /
    intervalSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1
