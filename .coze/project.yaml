name: OpenClaw-Personal-Assistant
version: "1.0.0"
preview:
  type: openclaw
  command:
    - openclaw
    - gateway
    - run
    - --port=5000
  port: 5000
  startupTimeoutSeconds: 120
  healthCheck:
    path: /
    intervalSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1
