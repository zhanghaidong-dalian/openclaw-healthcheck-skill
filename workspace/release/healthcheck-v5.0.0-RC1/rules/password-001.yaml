---
# 用户密码策略检查
id: password-001
name: 用户密码策略检查
category: password_security
severity: low
description: 检查用户密码策略配置

check:
  type: command
  command: grep -q "^pam_pwquality.so" /etc/pam.d/common-password && echo "policy_set" || echo "no_policy"

expected: policy_set

remediation:
  script: N/A
  command: echo "密码策略需要手动配置"
  restart_required: false

risk_assessment:
  if_violated: 用户密码策略未设置，可能存在弱密码
  if_fixed: 用户密码策略已设置

metadata:
  compliance: ["CIS_Benchmark"]
  tags: ["password", "security", "policy"]
