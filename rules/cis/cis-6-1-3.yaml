# CIS Benchmark Level 1

id: cis-6-1-3
category: cis/permissions
title: "确保 /etc/group 权限为 644 或更严格"
severity: low
description: |
  /etc/group 必须对所有用户可读。
compliance:
  - cis: "6.1.3"
check: |
  stat -c '%a' /etc/group | awk '$1 > 644'
fix: |
  chmod 644 /etc/group
risk_level: none
requires_root: true
